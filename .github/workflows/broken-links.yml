name: Broken Link Checker

permissions:
  contents: read

# runs on prs containing markdown or html changes, as well as every monday at 9 am
on:
  pull_request:
    paths:
      - "**.md"
      - "**.html"
  schedule:
    - cron: "0 9 * * 1"

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install dependencies
        run: npm ci
      - name: Build Legal
        run: npm run license-report:html
      - name: Determine link-check inputs
        id: inputs
        shell: bash
        run: |
          args="--exclude-path node_modules --verbose --no-progress './**/*.md' './**/*.html' './**/*.rst'"
          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            mapfile -t files < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '*.md' '*.html' '*.rst')
            if (( ${#files[@]} > 0 )); then
              printf -v args '%s' "--exclude-path node_modules --verbose --no-progress"
              printf -v file_args ' %q' "${files[@]}"
              args+="${file_args}"
            fi
          fi
          printf 'args=%s\n' "${args}" >> "${GITHUB_OUTPUT}"
      - uses: lycheeverse/lychee-action@v2.6.1
        with:
          fail: true
          jobSummary: false
          args: ${{ steps.inputs.outputs.args }}
